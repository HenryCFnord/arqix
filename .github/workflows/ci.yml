# The repository gate: the same checks `just ci` runs locally — cargo test,
# the dogfooded `arqix verify` (the corpus checks), markdownlint, and the
# Rust lints. Coverage stays informational inside `arqix verify` while the
# corpus is under construction.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    # contents: write is for the snapshot refresh on main, actions: write
    # for re-dispatching the pages deploy after it; every other step only
    # reads the repository.
    permissions:
      contents: write
      actions: write
    # One gate run at a time on main, so two quick merges cannot race the
    # snapshot push.
    concurrency:
      group: gate-${{ github.ref }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      # snapshot-strategy = "main-only" (owner decision 2026-07-12, see
      # docs/en/processes/configuration.md): parallel branches skip the
      # freshness gate, and main regains freshness right here — regenerate,
      # auto-commit, then verify the fresh state. Removing this step switches
      # to the "next change brings the regeneration along" variant.
      - name: Install cargo-llvm-cov (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Refresh report snapshots (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The concurrency group serialises gate runs on main; syncing to
          # origin/main first makes the push below a guaranteed fast-forward
          # even when a newer merge queued behind this run.
          git fetch origin main
          git reset --hard origin/main
          # The freshness check decides, not a diff: regeneration always
          # rewrites the snapshot stamp (commit + date), so diffing after
          # regenerating would commit on every push. --check regenerates
          # with the stamp already in the files and compares content.
          if ./target/debug/arqix report snapshot --check; then
            echo "snapshots fresh, nothing to refresh"
            exit 0
          fi
          ./target/debug/arqix report snapshot --stamp "$(git rev-parse --short HEAD), $(date +%F)"
          ./target/debug/arqix trace matrix > docs/en/reports/trace/matrix.csv
          ./target/debug/arqix trace matrix --type us-req > docs/en/reports/trace/matrix-us-req.csv
          ./target/debug/arqix report statements > docs/en/reports/requirements/normative-statements.csv
          ./target/debug/arqix report claims > docs/en/reports/claims.csv
          # Q-10: the coverage unit is CI-generated, outside the snapshot gate.
          cargo llvm-cov --json --output-path /tmp/coverage.json
          ./target/debug/arqix report coverage --input /tmp/coverage.json --stamp "$(git rev-parse --short HEAD), $(date +%F)"
          if ! git diff --quiet -- docs/en/reports; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/en/reports
            git commit -m "chore: refresh report snapshots"
            git push origin HEAD:main
            # A GITHUB_TOKEN push triggers no workflows, so the pages deploy
            # (which already ran against the stale snapshots) is re-dispatched
            # explicitly; its concurrency group supersedes the stale run.
            gh workflow run pages.yml --ref main
          fi

      - name: Cargo tests
        run: cargo test --quiet

      - name: Dogfooded arqix verify (the corpus gate)
        run: ./target/debug/arqix verify

      - name: Markdown lint
        run: npx --yes markdownlint-cli2@0.23.0

      - name: Rust lints
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo fmt --check
