# Build and deploy arqix.dev: arqix stages the corpus (`publish site`),
# Zensical renders it, the result deploys to GitHub Pages (custom domain
# arqix.dev). Until 1.0.0 the site follows main (owner decision 2026-07-11);
# releases additionally attach artefacts via release.yml.
name: pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "arqix.toml"
      - "zensical.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Pinned so the published site is reproducible (same rule as the
      # markdownlint pin in the gate).
      - name: Install the site toolchain
        run: pip install zensical==0.0.50

      - name: Build arqix
        run: cargo build --release

      - name: Publish the site (stage + Zensical)
        run: target/release/arqix publish site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site-build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
