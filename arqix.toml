# arqix configuration (schema v1) — this repository dogfoods itself.
# The verify and publish policies are documented in
# docs/en/processes/configuration.md.

# Snapshot strategy (owner decision 2026-07-12): parallel branches skip the
# report-freshness gate; the default branch regains freshness through the
# auto-commit step in ci.yml. The alternative — the next change brings the
# regeneration along — stays available by removing that step (see
# docs/en/processes/configuration.md, reports policy).
[policies.reports]
snapshot-strategy = "main-only"

[policies.render]
# arqix orchestrates Pandoc; the render runs in the fat Pandoc/LaTeX/eisvogel
# container so a local `just render-pdf` is byte-for-byte the pipeline render —
# the same local-equals-CI posture as the Kroki view render (ADR-0016). The
# shim mounts the repo and forwards arqix's pandoc arguments into the container.
pdf-command = "./scripts/pandoc-docker.sh"
defaults = "docs/pandoc/defaults.yaml"

[policies.publish]
site-command = "zensical build"
# The specification returns to the site in bundled form (US-04-01-17):
# one catalogue page per workflow group, anchors per ID, live coverage.
specification-catalogue = true
# The publish scope: internal plan packages and templates never leave the
# repository; requirement and story source files stay off the site — the
# generated specification catalogue above bundles them instead.
exclude = [
    "plans",
    "templates",
    "architecture/req",
    "architecture/stories",
    # Personas are spec-internal material like stories (owner decision
    # 2026-07-11, after the site review called them out).
    "architecture/personas",
]
# Brand assets ride into staging so the toolchain can reference them.
# The generated architecture views (ADR-0016) ride along the same way: the C4
# SVGs rendered from workspace.dsl reach staging so the docs can embed them.
assets = [
    "assets/arqix-logo-transparent.png",
    "docs/en/architecture/model/generated",
]
