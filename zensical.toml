# Zensical configuration for arqix.dev — the site toolchain behind
# `arqix publish site` (see docs/en/processes/configuration.md).
# arqix stages the corpus into site-src/; Zensical renders it to site-build/.

[project]
site_name = "arqix"
site_description = "A Rust CLI for structured technical documentation and Architecture-as-Code workflows: Markdown as data, deterministic assembly, traceability as a graph."
site_author = "hcf"
site_url = "https://arqix.dev/"
docs_dir = "site-src"
site_dir = "site-build"
copyright = "MIT OR Apache-2.0 · built in the open, with AI assistance documented in the repository"

[project.theme]
language = "en"
features = [
    "content.code.copy",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
logo = "lucide/git-branch"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/HenryCFnord/arqix"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
