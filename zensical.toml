# Zensical configuration for arqix.dev — the site toolchain behind
# `arqix publish site` (see docs/en/processes/configuration.md).
# arqix stages the corpus into site-src/; Zensical renders it to site-build/.

[project]
site_name = "arqix"
site_description = "A Rust CLI for structured technical documentation and Architecture-as-Code workflows: Markdown as data, deterministic assembly, traceability as a graph."
site_author = "hcf"
site_url = "https://arqix.dev/"
docs_dir = "site-src"
site_dir = "site-build"
copyright = "MIT OR Apache-2.0 · built in the open, with AI assistance documented in the repository"

# Curated navigation (grouping: Home / Getting Started / Documents / Reports /
# Blog newest-first). Paths are relative to docs_dir (site-src). The
# specification/* pages are generated by `publish site` (one per workflow group
# with stories) — verify the exact set with a local `zensical build` and drop
# any group that has no page yet.
nav = [
  { "arqix" = "index.md" },
  { "Getting Started" = [
    "getting-started.md",
    { "Why arqix" = "why-arqix.md" },
  ] },
  { "Documents" = [
    { "Architecture" = [
      "architecture/arc42/index.md",
      { "Overview (arc42)" = "architecture/arc42/page-arc42-arqix-architecture.md" },
      { "Interfaces (ICD)" = "architecture/icd/page-icd-machine-interface.md" },
      { "Decision Records" = [
        "architecture/adr/index.md",
        "architecture/adr/ADR-0001-agent-instruction-document-layout.md",
        "architecture/adr/ADR-0002-c4-model-source-and-rendering.md",
        "architecture/adr/ADR-0003-verification-orchestrator.md",
        "architecture/adr/ADR-0004-finalise-and-the-mechanical-rewriter.md",
        "architecture/adr/ADR-0005-command-taxonomy.md",
        "architecture/adr/ADR-0006-trace-output-contracts.md",
        "architecture/adr/ADR-0007-graph-node-identity.md",
        "architecture/adr/ADR-0008-question-driven-report-units.md",
        "architecture/adr/ADR-0009-documentation-production-policy.md",
        "architecture/adr/ADR-0010-lifecycle-vocabularies.md",
        "architecture/adr/ADR-0011-configuration-boundary.md",
        "architecture/adr/ADR-0012-id-policy-model.md",
        "architecture/adr/ADR-0013-stitching-model.md",
        "architecture/adr/ADR-0014-mcp-transport.md",
        "architecture/adr/ADR-0015-marker-freshness.md",
        "architecture/adr/ADR-0016-render-architecture-views.md",
      ] },
      { "Workflows" = [
        "architecture/workflows/WF-01-01-establish-standards-and-repository-hygiene.md",
        "architecture/workflows/WF-02-01-write-docs-alongside-implementation.md",
        "architecture/workflows/WF-03-01-validate-traceability-and-coverage.md",
        "architecture/workflows/WF-04-01-run-ci-gates-and-publish-artefacts.md",
        "architecture/workflows/WF-05-01-use-documentation-for-agents-and-rag.md",
        "architecture/workflows/WF-06-01-maintain-architecture-adrs-and-glossary.md",
        "architecture/workflows/WF-07-01-review-evidence-chains-and-exports.md",
        "architecture/workflows/WF-08-01-story-by-story-implementation-with-arqix.md",
        "architecture/workflows/WF-09-01-prepare-and-publish-releases.md",
        "architecture/workflows/WF-10-01-refine-and-consolidate-the-corpus.md",
      ] },
    ] },
    { "Manual" = [
      "manual/index.md",
      { "Agent Handbook" = "manual/page-manual-agent-handbook.md" },
    ] },
    { "Processes" = [
      "processes/configuration.md",
      "processes/requirements-style-guide.md",
      "processes/markdown-style-guide.md",
      "processes/embedding-diagrams.md",
      "processes/agent-orchestration-patterns.md",
    ] },
    { "Project" = [
      "project/roadmap.md",
      "project/ai-transparency.md",
    ] },
    { "Specification" = [
      "specification/index.md",
      "specification/wf-01-01.md",
      "specification/wf-02-01.md",
      "specification/wf-03-01.md",
      "specification/wf-04-01.md",
      "specification/wf-05-01.md",
      "specification/wf-06-01.md",
      "specification/wf-07-01.md",
      "specification/wf-08-01.md",
      "specification/wf-09-01.md",
      "specification/wf-10-01.md",
    ] },
  ] },
  # Explicit labels: the generated report units open with a `<!-- GENERATED
  # SNAPSHOT -->` comment before their H1, so Zensical derives no title and the
  # auto-label falls back to "none". Labelling each entry here fixes the nav
  # regardless of the page's derivable title. The `units/index.md` landing is a
  # redundant stub (the units are listed below), so it is dropped.
  { "Reports" = [
    "reports/README.md",
    { "Scoreboard" = "reports/units/scoreboard.md" },
    { "Story progress" = "reports/units/story-progress.md" },
    { "Code to requirement" = "reports/units/code-to-requirement.md" },
    { "Test to requirement" = "reports/units/test-to-requirement.md" },
    { "Test to story" = "reports/units/test-to-story.md" },
    { "Test to workflow" = "reports/units/test-to-workflow.md" },
    { "ADR to requirement" = "reports/units/adr-to-requirement.md" },
    { "Doc to code" = "reports/units/doc-to-code.md" },
    { "Question catalog" = "reports/QUESTIONS.md" },
  ] },
  { "Blog" = [
    "blog/index.md",
    { "arqix 0.1.0" = "blog/2026-07-arqix-0-1-0.md" },
    { "Would arqix help me?" = "blog/2026-07-would-arqix-help-me.md" },
    { "Why 'related' is not enough" = "blog/2026-03-why-related-is-not-enough.md" },
    { "Why arqix had to exist" = "blog/2026-03-why-arqix-had-to-exist.md" },
  ] },
]

[project.theme]
language = "en"
logo = "assets/arqix-logo-transparent.png"
favicon = "assets/arqix-logo-transparent.png"
features = [
    "content.code.copy",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/HenryCFnord/arqix"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
