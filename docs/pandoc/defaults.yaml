# Pandoc defaults for arqix's `render pdf` (REQ-04-01-03-05), applied via
# --defaults. Paths are relative to the repository root, which the container
# shim (scripts/pandoc-docker.sh) mounts at its working directory, so a local
# `just render-pdf` and the pipeline render read the same file.
#
# eisvogel and xelatex ship in the fat image (pandoc/extra); rsvg-convert in the
# same image turns the embedded C4 SVG views into PDF automatically.
template: eisvogel
# xelatex, not pdflatex: eisvogel's default fonts are OpenType (Source Sans /
# Serif / Code Pro), and only a Unicode-aware engine (xelatex or lualatex) can
# load system OTF fonts — pdflatex cannot, so it would fail to build eisvogel as
# shipped. xelatex also gives the docs' non-ASCII glyphs a real font path.
pdf-engine: xelatex
toc: true
number-sections: true

# Staging moves the assembled pages out of the source tree, so their image links
# (`../model/generated/…` from the arc42 page, `../../model/generated/…` from a
# unit) no longer resolve relative to the staged file. resource-path gives pandoc
# the source anchors those relative paths were written against, so the committed
# C4 SVGs are found and embedded. Paths are relative to the repo root (mounted at
# the container's working directory).
resource-path:
  - .
  - docs/en/architecture/arc42
  - docs/en/architecture/arc42/units

# eisvogel title-page variables (REQ-04-01-03-05). These are constant across
# documents; each document's own title and date arrive from the publisher as
# metadata (--metadata title=…, REQ-04-01-03-09), so the title page and running
# header are per-document. Colours are hex without a leading '#' and must be
# quoted — a bare '#' starts a YAML comment. The logo resolves through the
# resource-path above; the asset already rides into staging (arqix.toml).
variables:
  titlepage: true
  titlepage-color: "1F2430"
  titlepage-text-color: "FFFFFF"
  titlepage-rule-color: "5CC8FF"
  titlepage-rule-height: 2
  logo: "assets/arqix-logo-transparent.png"
  logo-width: "70mm"

# Task-list checkbox glyphs (U+2610/2611/2612) need a font/fallback the eisvogel
# default lacks; docs/pandoc/header.tex maps them to DejaVu Sans when the render
# image ships it, and to a base-LaTeX framed box otherwise (a no-tofu floor that
# needs no extra packages — the pinned image is a curated TeX Live subset).
include-in-header:
  - docs/pandoc/header.tex
